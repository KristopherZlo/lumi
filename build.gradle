plugins {
    id 'fabric-loom' version "${loom_version}"
    id 'maven-publish'
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = project.archives_base_name
}

repositories {
    maven {
        url = 'https://maven.fabricmc.net/'
    }
    maven {
        url = 'https://api.modrinth.com/maven'
    }
    maven {
        url = 'https://maven.wispforest.io/releases/'
    }
    maven {
        url = 'https://maven.shedaniel.me/'
    }
    maven {
        url = 'https://jitpack.io'
    }
    mavenCentral()
}

loom {
    splitEnvironmentSourceSets()

    mods {
        lumi {
            sourceSet sourceSets.main
            sourceSet sourceSets.client
        }
    }

    runs {
        testClient {
            inherit client
            configName = 'Lumi Test Client'
            runDir = 'run/test-client'
            programArg '--username'
            programArg providers.gradleProperty('lumi.testUsername').orElse('LumiTestClient').get()
        }
    }
}

fabricApi {
    configureTests {
        createSourceSet = true
        modId = 'lumi-gametest'
        enableGameTests = true
        enableClientGameTests = true
        eula = true
    }
}

sourceSets {
    test {
        compileClasspath += sourceSets.client.output
        runtimeClasspath += sourceSets.client.output
    }
}

configurations {
    testClientMods
}

configurations.named('testImplementation') {
    extendsFrom configurations.clientImplementation
}

configurations.named('testRuntimeOnly') {
    extendsFrom configurations.clientRuntimeOnly
}

def legacyArtifactPatterns = ['luma-*.jar', 'luma-*.pom', 'luma-*.module']
def devRuntimeSelfModPatterns = ['luma-*.jar', 'lumi-*.jar']

def deleteMatchingFiles = { File directory, Collection<String> includes ->
    if (!directory.exists()) {
        return []
    }

    def matchingFiles = fileTree(directory) {
        includes.each { include(it) }
    }.files.toList()

    if (!matchingFiles.isEmpty()) {
        delete(matchingFiles)
    }

    return matchingFiles
}

def purgeLegacyArtifacts = tasks.register('purgeLegacyArtifacts') {
    group = 'build setup'
    description = 'Removes stale legacy Luma build artifacts after the Lumi rename.'

    doLast {
        def removedFiles = deleteMatchingFiles(layout.buildDirectory.dir('libs').get().asFile, legacyArtifactPatterns)
        removedFiles.each { file ->
            logger.lifecycle("Removed stale legacy artifact {}", file)
        }
    }
}

def purgeDevRuntimeSelfMods = tasks.register('purgeDevRuntimeSelfMods') {
    group = 'fabric'
    description = 'Removes packaged Lumi or legacy Luma jars from dev run mods folders before launch.'

    doLast {
        [
                layout.projectDirectory.dir('run/mods').asFile,
                layout.projectDirectory.dir('run/test-client/mods').asFile
        ].each { directory ->
            def removedFiles = deleteMatchingFiles(directory, devRuntimeSelfModPatterns)
            removedFiles.each { file ->
                logger.lifecycle("Removed packaged self-mod from dev run directory {}", file)
            }
        }
    }
}

