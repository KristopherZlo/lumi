def downloadPinnedTestClientMods = tasks.register('downloadPinnedTestClientMods') {
    def outputDir = layout.buildDirectory.dir('test-client-downloads')
    outputs.dir(outputDir)

    doLast {
        def targetDir = outputDir.get().asFile
        if (targetDir.exists()) {
            delete(targetDir.listFiles())
        }
        targetDir.mkdirs()

        pinnedTestClientModFiles.each { fileName, url ->
            def outputFile = new File(targetDir, fileName)
            ant.get(src: url, dest: outputFile, skipexisting: false)
        }
    }
}

tasks.register('installTestClientMods', Sync) {
    dependsOn(downloadPinnedTestClientMods)
    from(configurations.testClientMods)
    from(layout.buildDirectory.dir('test-client-downloads'))
    into(layout.projectDirectory.dir('run/test-client/mods'))

    doLast {
        delete(
                fileTree(destinationDir) {
                    include 'lazydfu*.jar'
                    include 'LazyDFU*.jar'
                    include 'entityculling-1.10.1.jar'
                    include 'forge-config-api-port-*.jar'
                }
        )
    }
}

tasks.named('runTestClient').configure {
    dependsOn(tasks.named('installTestClientMods'))
}

tasks.matching { it.name in ['jar', 'sourcesJar', 'remapJar', 'remapSourcesJar'] }.configureEach {
    dependsOn(purgeLegacyArtifacts)
}

tasks.register('runProductionClientGameTest', net.fabricmc.loom.task.prod.ClientProductionRunTask) {
    jvmArgs.add('-Dfabric.client.gametest')
    jvmArgs.add('-Dfabric.client.gametest.disableNetworkSynchronizer=true')
    useXVFB = true
}

['runClient', 'runTestClient', 'runGameTest', 'runClientGameTest', 'runProductionClientGameTest'].each { taskName ->
    tasks.named(taskName).configure {
        dependsOn(purgeDevRuntimeSelfMods)
    }
}

def targetJavaVersion = 21

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = targetJavaVersion
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}

processResources {
    inputs.property 'version', project.version
    filteringCharset = 'UTF-8'

    filesMatching('fabric.mod.json') {
        expand(
                version: project.version,
                minecraft_version: project.minecraft_version,
                loader_version: project.loader_version,
                fabric_api_version: project.fabric_api_version,
                owo_version: project.owo_version,
                cloth_config_version: project.cloth_config_version
        )
    }
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(targetJavaVersion)
    sourceCompatibility = JavaVersion.toVersion(targetJavaVersion)
    targetCompatibility = JavaVersion.toVersion(targetJavaVersion)
    withSourcesJar()
}

publishing {
    publications {
        create('mavenJava', MavenPublication) {
            artifactId = project.archives_base_name
            from components.java
        }
    }
}
